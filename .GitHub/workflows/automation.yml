name: Detective Conan Automation

on:
  schedule:
    # Run at 7 AM, 8 AM, and 9 AM Central Time on Saturdays
    # Central Time is UTC-6 (or UTC-5 during DST)
    # 7 AM CT = 1 PM UTC (or 12 PM UTC during DST)
    # 8 AM CT = 2 PM UTC (or 1 PM UTC during DST)
    # 9 AM CT = 3 PM UTC (or 2 PM UTC during DST)
    # Using 1 PM UTC for 7 AM CT (accounting for standard time)
    - cron: '0 13 * * 6'  # 1 PM UTC = 7 AM CT (Saturday)
    - cron: '0 14 * * 6'  # 2 PM UTC = 8 AM CT (Saturday)
    - cron: '0 15 * * 6'  # 3 PM UTC = 9 AM CT (Saturday)
  
  # Manual trigger with custom inputs
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'search'
        type: choice
        options:
          - search
          - batch_process
          - sync_doodstream
          - encrypt_links
          - full_automation
      episode_ranges:
        description: 'Episode ranges (e.g., 100-150, 200-250)'
        required: false
        type: string
      search_query:
        description: 'Search query for DoodStream'
        required: false
        type: string
      category:
        description: 'Episode category'
        required: false
        default: 'original_hard_sub'
        type: choice
        options:
          - original_hard_sub
          - original_soft_sub
          - remastered_hard_sub
          - dub

jobs:
  automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Configure timezone
        run: |
          sudo timedatectl set-timezone America/Chicago
          date
      
      - name: Run scheduled automation
        if: github.event_name == 'schedule'
        env:
          DOODSTREAM_API_KEY: ${{ secrets.DOODSTREAM_API_KEY }}
          XOR_ENCRYPTION_KEY: ${{ secrets.XOR_ENCRYPTION_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd scripts
          python automation.py --action full_automation --log-level INFO
      
      - name: Run search operation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'search'
        env:
          DOODSTREAM_API_KEY: ${{ secrets.DOODSTREAM_API_KEY }}
        run: |
          cd scripts
          python automation.py --action search --query "${{ github.event.inputs.search_query }}"
      
      - name: Run batch processing
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'batch_process'
        env:
          DOODSTREAM_API_KEY: ${{ secrets.DOODSTREAM_API_KEY }}
          XOR_ENCRYPTION_KEY: ${{ secrets.XOR_ENCRYPTION_KEY }}
        run: |
          cd scripts
          python automation.py --action batch_process \
            --ranges "${{ github.event.inputs.episode_ranges }}" \
            --category "${{ github.event.inputs.category }}"
      
      - name: Run DoodStream sync
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'sync_doodstream'
        env:
          DOODSTREAM_API_KEY: ${{ secrets.DOODSTREAM_API_KEY }}
          XOR_ENCRYPTION_KEY: ${{ secrets.XOR_ENCRYPTION_KEY }}
        run: |
          cd scripts
          python automation.py --action sync_doodstream
      
      - name: Run encryption tool
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'encrypt_links'
        env:
          XOR_ENCRYPTION_KEY: ${{ secrets.XOR_ENCRYPTION_KEY }}
        run: |
          cd scripts
          python encryption.py
      
      - name: Run full automation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'full_automation'
        env:
          DOODSTREAM_API_KEY: ${{ secrets.DOODSTREAM_API_KEY }}
          XOR_ENCRYPTION_KEY: ${{ secrets.XOR_ENCRYPTION_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd scripts
          python automation.py --action full_automation
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: automation-logs
          path: scripts/automation.log
          retention-days: 7
      
      - name: Commit and push changes
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Automated Detective Conan sync - $(date)" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Automation workflow failed',
              body: `The Detective Conan automation workflow failed on ${new Date().toISOString()}\n\nCheck the [workflow run](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            })
